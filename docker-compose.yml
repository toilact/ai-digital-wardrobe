services:
  ai-service:
    container_name: ai-digital-wardrobe-ai
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENABLE_SAM=1
      - SAM_MODEL_TYPE=vit_t
      - SAM_CHECKPOINT=/app/checkpoints/mobile_sam.pt
      - SAM_MAX_SIDE=768
      - SAM_USE_FP16=0
      - CUTOUT_MAX_CONCURRENCY=1
      - TORCH_NUM_THREADS=1

      - ENABLE_AUTO_LABEL=1
      - PRELOAD_CLIP=1
      - AUTO_LABEL_BACKEND=clip
      - AUTO_LABEL_INCLUDE_COLOR=0
      - CLIP_DEVICE=cpu
      - CLIP_MODEL_NAME=ViT-B-32
      - CLIP_PRETRAINED=laion2b_s34b_b79k

      - PRODUCT_MAX_SIDE=1280
      - MAX_UPLOAD_MB=8
      - PNG_COMPRESS_LEVEL=3
    volumes:
      - ./ai-service/checkpoints:/app/checkpoints

  web:
    container_name: ai-digital-wardrobe-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:3000"
    env_file:
      - .env.local
    environment:
      - DOCKER=1
      - AI_SERVICE_URL=http://ai-service:8000
      - LABEL_STRATEGY=service
      - AI_LABEL_BACKEND=clip
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - ai-service
