version: "3.8"

services:
  ai-service:
    container_name: ai-digital-wardrobe-ai
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENABLE_AUTO_LABEL=1
      - AUTO_LABEL_BACKEND=clip
      - AUTO_LABEL_INCLUDE_COLOR=0
      - CLIP_DEVICE=cpu
      - CLIP_MODEL_NAME=ViT-B-32
      - CLIP_PRETRAINED=laion2b_s34b_b79k
    volumes:
      - ./ai-service/checkpoints:/app/checkpoints
    dns:
      - 1.1.1.1
      - 8.8.8.8

  web:
    container_name: ai-digital-wardrobe-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - DOCKER=1
      - AI_SERVICE_URL=http://ai-service:8000
      - LABEL_STRATEGY=service
      - AI_LABEL_BACKEND=clip
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - ai-service
    dns:
      - 1.1.1.1
      - 8.8.8.8